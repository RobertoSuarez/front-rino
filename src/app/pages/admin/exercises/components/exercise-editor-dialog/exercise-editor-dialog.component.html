<p-dialog [header]="currentEditMeta ? 'Editar Ejercicio' : 'Nuevo Ejercicio'" [(visible)]="displayDialog"
    (onHide)="hideDialog()" [style]="{width: '70vw', height: '90vh'}" [modal]="true" [closable]="true"
    class="rounded-lg shadow-xl">
    <form [formGroup]="exerciseForm" (ngSubmit)="saveExercise()"
        class="p-fluid space-y-4 pt-4">

        <div class="field space-y-2">
            <label for="typeExercise" class="block text-sm font-medium text-gray-700">Tipo de Ejercicio</label>
            <select id="typeExercise" formControlName="typeExercise" (change)="onExerciseTypeChange()"
                class="w-full xl:w-1/2 p-2 border border-gray-300 rounded-md focus:ring-blue-500 focus:border-blue-500">
                <option *ngFor="let option of exerciseTypes" [value]="option.value">{{option.label}}</option>
            </select>
        </div>

        <div class="field space-y-2">
            <label for="statement" class="block text-sm font-medium text-gray-700">Enunciado</label>
            <textarea id="statement" pInputTextarea formControlName="statement" rows="3" required
                class="w-full p-2 border border-gray-300 rounded-md focus:ring-blue-500 focus:border-blue-500"></textarea>
            <small *ngIf="exerciseForm.get('statement')?.invalid && exerciseForm.get('statement')?.touched"
                class="text-red-500">
                El enunciado es requerido
            </small>
        </div>

        <div class="field space-y-2">
            <label for="difficulty" class="block text-sm font-medium text-gray-700">Dificultad</label>
            <select id="difficulty" formControlName="difficulty"
                class="w-full xl:w-1/2 p-2 border border-gray-300 rounded-md focus:ring-blue-500 focus:border-blue-500">
                <option *ngFor="let option of difficultyOptions" [value]="option.value">{{option.label}}</option>
            </select>
        </div>

        <div class="field space-y-2">
            <label for="hind" class="block text-sm font-medium text-gray-700">Pista</label>
            <textarea id="hind" pInputTextarea formControlName="hind" rows="2" required
                class="w-full p-2 border border-gray-300 rounded-md focus:ring-blue-500 focus:border-blue-500"></textarea>
            <small *ngIf="exerciseForm.get('hind')?.invalid && exerciseForm.get('hind')?.touched" class="text-red-500">
                La pista es requerida
            </small>
        </div>

        <!-- Componentes dinámicos según el tipo de ejercicio -->
        <div class="field space-y-2 bg-gray-50 p-6 rounded-xl border border-gray-200 mt-6">
            <label class="block text-lg font-black text-gray-700 mb-4 uppercase tracking-wider">Configuración del Ejercicio</label>

            <app-selection-single *ngIf="exerciseForm.get('typeExercise')?.value === 'selection_single'"
                [initialData]="exerciseTypeData" (dataChange)="onExerciseDataChange($event)">
            </app-selection-single>

            <app-selection-multiple *ngIf="exerciseForm.get('typeExercise')?.value === 'selection_multiple'"
                [initialData]="exerciseTypeData" (dataChange)="onExerciseDataChange($event)">
            </app-selection-multiple>

            <app-vertical-ordering *ngIf="exerciseForm.get('typeExercise')?.value === 'vertical_ordering'"
                [initialData]="exerciseTypeData" (dataChange)="onExerciseDataChange($event)">
            </app-vertical-ordering>

            <app-horizontal-ordering *ngIf="exerciseForm.get('typeExercise')?.value === 'horizontal_ordering'"
                [initialData]="exerciseTypeData" (dataChange)="onExerciseDataChange($event)">
            </app-horizontal-ordering>

            <app-phishing-selection-multiple
                *ngIf="exerciseForm.get('typeExercise')?.value === 'phishing_selection_multiple'"
                [initialData]="exerciseTypeData" (dataChange)="onExerciseDataChange($event)">
            </app-phishing-selection-multiple>

            <app-match-pairs *ngIf="exerciseForm.get('typeExercise')?.value === 'match_pairs'"
                [initialData]="exerciseTypeData" (dataChange)="onExerciseDataChange($event)">
            </app-match-pairs>
        </div>

        <div class="flex justify-end gap-3 mt-6 pt-6 border-t border-gray-200">
            <button type="button" class="gamified-action-btn secondary" (click)="hideDialog()">CANCELAR</button>
            <button type="submit" class="gamified-publish-btn" [disabled]="exerciseForm.invalid">
                <i class="pi pi-check mr-2"></i> {{ currentEditMeta ? 'ACTUALIZAR EJERCICIO' : 'GUARDAR EJERCICIO' }}
            </button>
        </div>
    </form>
</p-dialog>
