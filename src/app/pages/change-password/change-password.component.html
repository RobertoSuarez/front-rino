<div class="cp-layout">
    <p-toast></p-toast>

    <div class="w-full px-4 sm:px-8 py-2">
        <p-breadcrumb [model]="breadcrumbItems" [home]="breadcrumbHome"></p-breadcrumb>
    </div>



    <div class="cp-card">
        <div class="cp-top-section">
            <div class="cp-icon-box">
                <i class="pi pi-shield"></i>
            </div>
            <div class="cp-form-title">
                <h2>Cambiar Contraseña</h2>
                <p>Actualiza tus credenciales para mantener tu progreso seguro.</p>
            </div>
        </div>

        <form [formGroup]="changePasswordForm" (ngSubmit)="onSubmit()" class="cp-form-row">
            <!-- Current Password -->
            <div class="cp-field">
                <label for="oldPassword">
                    <i class="pi pi-lock-open"></i> Contraseña Actual
                </label>
                <p-password id="oldPassword" formControlName="oldPassword" placeholder="Ingresa tu clave actual"
                    [toggleMask]="true" [feedback]="false" [class.ng-invalid]="submitted && oldPassword?.invalid"
                    [class.ng-dirty]="submitted && oldPassword?.invalid">
                </p-password>
                <small class="text-red-500 font-bold ml-1" *ngIf="submitted && oldPassword?.invalid">
                    <i class="pi pi-exclamation-circle text-[10px]"></i> Requerido
                </small>
            </div>

            <div class="cp-separator">
                <span>NUEVA CREDENCIAL</span>
                <div class="cp-line"></div>
            </div>

            <!-- New Password -->
            <div class="cp-field">
                <label for="newPassword">
                    <i class="pi pi-key"></i> Nueva Contraseña
                </label>
                <p-password id="newPassword" formControlName="newPassword" placeholder="Mínimo 8 caracteres"
                    [toggleMask]="true" [feedback]="false" [class.ng-invalid]="submitted && newPassword?.invalid"
                    [class.ng-dirty]="submitted && newPassword?.invalid">
                </p-password>

                <div class="strength-meter">
                    <div class="meter-header">
                        <span class="meter-label">SEGURIDAD DE LA CLAVE</span>
                        <span class="status-badge" [ngClass]="{
                  'bg-red-100 text-red-600': passwordStrengthCount <= 1,
                  'bg-amber-100 text-amber-600': passwordStrengthCount > 1 && passwordStrengthCount <= 3,
                  'bg-emerald-100 text-emerald-600': passwordStrengthCount > 3
                }">
                            {{ passwordStrengthLabel }}
                        </span>
                    </div>
                    <div class="meter-bars">
                        <div class="bar" [class.active]="passwordStrengthCount >= 1"></div>
                        <div class="bar" [class.active]="passwordStrengthCount >= 2"></div>
                        <div class="bar" [class.active]="passwordStrengthCount >= 3"></div>
                        <div class="bar" [class.active]="passwordStrengthCount >= 4"></div>
                    </div>

                    <div class="meter-grid">
                        <div class="check-item" [class.passed]="hasMinLength()">
                            <i class="pi" [ngClass]="hasMinLength() ? 'pi-check-circle' : 'pi-circle'"></i>
                            <span>8+ Caracteres</span>
                        </div>
                        <div class="check-item" [class.passed]="hasUppercase()">
                            <i class="pi" [ngClass]="hasUppercase() ? 'pi-check-circle' : 'pi-circle'"></i>
                            <span>Mayúscula</span>
                        </div>
                        <div class="check-item" [class.passed]="hasNumber()">
                            <i class="pi" [ngClass]="hasNumber() ? 'pi-check-circle' : 'pi-circle'"></i>
                            <span>Número</span>
                        </div>
                        <div class="check-item" [class.passed]="hasSpecialChar()">
                            <i class="pi" [ngClass]="hasSpecialChar() ? 'pi-check-circle' : 'pi-circle'"></i>
                            <span>Símbolo</span>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Confirm Password -->
            <div class="cp-field">
                <label for="confirmPassword" class="flex justify-between items-center w-full">
                    <span class="flex items-center gap-2">
                        <i class="pi pi-check-square"></i> Confirmar Nueva Contraseña
                    </span>
                    <span *ngIf="passwordsMatch" class="text-emerald-500 text-[10px] font-black tracking-widest animate-in fade-in slide-in-from-right-2">
                        <i class="pi pi-check-circle"></i> COINCIDEN
                    </span>
                </label>
                <p-password id="confirmPassword" formControlName="confirmPassword" placeholder="Repite tu nueva clave"
                    [toggleMask]="true" [feedback]="false" 
                    [class.ng-invalid]="(submitted || confirmPassword?.dirty) && confirmPassword?.invalid"
                    [class.ng-dirty]="confirmPassword?.dirty">
                </p-password>
                <small class="text-red-500 font-bold ml-1"
                    *ngIf="(submitted || confirmPassword?.dirty) && confirmPassword?.hasError('passwordMismatch')">
                    <i class="pi pi-exclamation-triangle text-[10px]"></i> Las claves no coinciden
                </small>
            </div>

            <div class="cp-actions">
                <button type="button" class="cp-btn btn-secondary" (click)="cancel()" [disabled]="loading">
                    <i class="pi pi-times"></i> Cancelar
                </button>
                <button type="submit" class="cp-btn btn-primary" [disabled]="loading">
                    <i class="pi" [ngClass]="loading ? 'pi-spin pi-spinner' : 'pi-check'"></i>
                    {{ loading ? 'Actualizando...' : 'Actualizar Contraseña' }}
                </button>
            </div>
        </form>
    </div>
</div>
